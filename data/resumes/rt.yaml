work:
  - name: Bloomberg L.P.
    location: 731 Lexington Ave., New York, NY 10022
    description: A financial, software, data, and media company
    position: Red Team Operator & Security Engineer
    url: https://www.bloomberg.com
    startDate: "2021-05-01"
    highlights:
      - Conducted 6-10 annual red team and penetration testing engagements, simulating APTs (MITRE ATT&CK) against AI systems, cloud infrastructure, and enterprise applications.
      - Achieved full compromise of high-value assets by exploiting complex deserialization, misconfigurations, and command injection vulnerabilities to pivot across isolated network segments.
      - Compromised AWS EKS clusters via IAM policy exploitation and command injection during Docker builds, demonstrating advanced container security proficiency.
      - Identified critical SSRF and RCE vulnerabilities in AI agent applications by uncovering undocumented dev parameters and chaining exploits to compromise internal services.
      - Secured LLM gateway APIs by discovering SQL injection in model selection parameters, preventing backend database access and API key exfiltration.
      - Executed AI jailbreak testing to bypass safety guardrails, providing empirical risk assessments for real-world AI system deployments.
      - Expanded attack-surface coverage and reduced overhead by 25% through the development of AI-assisted reconnaissance and reporting automation.
      - Achieved Domain Administrator privileges in complex environments by exploiting Active Directory Certificate Services (ADCS) and Kerberoasting.
      - Reverse-engineered obfuscated Android/iOS applications using Frida and Magisk; bypassed certificate pinning and root detection to expose hardcoded credentials.
      - Developed custom offensive tooling, including ICMP and RDP proxies, to facilitate lateral movement within highly restrictive network environments.
      - Discovered high-impact vulnerabilities in third-party email security and authentication systems through dedicated vulnerability research.
      - Orchestrated full-scope social engineering, leading successful phishing and MitM campaigns to test organizational resilience.
      - Scaled security culture by presenting technical findings to audiences of 100+ and designing internal CTF events with comprehensive debriefs.
      - Led organizational secret detection initiative, significantly reducing credential exposure across product teams and strengthening security posture.
      - Collaborated with TVM and CSOC teams to develop scanners and PoCs for critical open-source vulnerabilities, ensuring rapid remediation.
      - Identified a critical pre-authentication vulnerability in a third-party product during black-box testing that had been overlooked in multiple prior assessments.
      - Engineered custom automation scripts and infrastructure that modernized internal security review workflows and increased testing velocity.
